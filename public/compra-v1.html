<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingresos de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body class="container mt-4">

    <h3>Ingresos de Compras</h3>

    <!-- ENCABEZADO -->
    <div class="row mb-3">
        <div class="col">
            <label>Fondo</label>
            <select id="fondo" class="form-control"></select>
        </div>

        <div class="col">
            <label>Fecha</label>
            <input type="date" id="fecha" class="form-control">
        </div>
    </div>

    <hr>

    <h5>Detalle</h5>

    <div class="row mb-2">
        <div class="col">
            <input id="nemo" class="form-control" placeholder="Nemotécnico">
        </div>
        <div class="col">
            <input id="cantidad" type="number" class="form-control" placeholder="Cantidad">
        </div>
        <div class="col">
            <input id="precio" type="number" class="form-control" placeholder="Precio">
        </div>
        <div class="col">
            <button class="btn btn-success w-100" onclick="agregarDetalle()">Agregar</button>
        </div>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nemo</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tablaDetalle"></tbody>
    </table>

    <div class="text-end mb-3">
        <strong>Total: <span id="total">0</span></strong>
    </div>

    <button class="btn btn-primary" onclick="guardar()">Guardar Compra</button>

    <script>
        let detalles = [];

        async function cargarFondos() {
            const res = await fetch("/api/fondos");
            const data = await res.json();

            const select = document.getElementById("fondo");
            select.innerHTML = `<option value="">Seleccione</option>`;

            data.forEach(f => {
                select.innerHTML += `<option value="${f.id_fondo}">${f.nombre}</option>`;
            });
        }

        function agregarDetalle() {
            const nemo = document.getElementById("nemo").value;
            const cantidad = parseFloat(document.getElementById("cantidad").value);
            const precio = parseFloat(document.getElementById("precio").value);

            if (!nemo || !cantidad || !precio) {
                alert("Complete todos los campos");
                return;
            }

            detalles.push({ id_nemotecnico: nemo, cantidad, precio });

            renderTabla();

            document.getElementById("nemo").value = "";
            document.getElementById("cantidad").value = "";
            document.getElementById("precio").value = "";
        }

        function renderTabla() {
            const tabla = document.getElementById("tablaDetalle");
            tabla.innerHTML = "";

            let total = 0;

            detalles.forEach((d, index) => {
                const subtotal = d.cantidad * d.precio;
                total += subtotal;

                tabla.innerHTML += `
      <tr>
        <td>${d.id_nemotecnico}</td>
        <td>${d.cantidad}</td>
        <td>${d.precio}</td>
        <td>${subtotal}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="eliminar(${index})">X</button>
        </td>
      </tr>
    `;
            });

            document.getElementById("total").innerText = total;
        }

        function eliminar(index) {
            detalles.splice(index, 1);
            renderTabla();
        }

        async function guardar() {
            const fondo = document.getElementById("fondo").value;
            const fecha = document.getElementById("fecha").value;

            if (!fondo || !fecha || detalles.length === 0) {
                alert("Complete encabezado y detalle");
                return;
            }

            const res = await fetch("/api/operaciones/compra", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id_fondo: fondo,
                    fecha,
                    detalles
                })
            });

            const data = await res.json();

            alert("Compra guardada ID: " + data.id_operacion);

            detalles = [];
            renderTabla();
        }

        cargarFondos();
    </script>

</body>

</html>

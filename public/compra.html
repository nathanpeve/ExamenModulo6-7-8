<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingresos de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body>
    <!-- NAV SUPERIOR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestor Online - Portafolio
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>
    <!-- LAYOUT -->
    <div class="container-fluid">
        <div class="row">
            <!-- MENU LATERAL -->
            <div class="col-md-2 bg-light vh-100">
                <h6 class="mt-3">Menú</h6>
                <ul id="menu" class="nav flex-column mt-3"></ul>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-10 p-4">
                <h3>Ingresos de Compras</h3>

                <!-- ENCABEZADO -->
                <div class="row mb-3">
                    <div class="col">
                        <label>Fondo</label>
                        <select id="fondo" class="form-control"></select>
                    </div>

                    <div class="col">
                        <label>Fecha</label>
                        <input type="date" id="fecha" class="form-control">
                    </div>
                </div>

                <hr>

                <h5>Detalle</h5>

                <div class="row mb-2">
                    <div class="col">
                        <input id="nemo" class="form-control" placeholder="Nemotécnico" onblur="validarNemo()">
                    </div>
                    <div class="col">
                        <input id="cantidad" type="number" step="0.0001" class="form-control" placeholder="Cantidad">
                    </div>
                    <div class="col">
                        <input id="precio" type="number" step="0.0001" class="form-control" placeholder="Precio">
                    </div>
                    <div class="col">
                        <button class="btn btn-success w-100" onclick="agregarDetalle()">Agregar</button>
                    </div>
                </div>

                <table class="table table-bordered">
                    <thead class="table-light">
                        <tr>
                            <th>Nemotécnico</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tablaDetalle"></tbody>
                </table>

                <div class="text-end mb-3">
                    <strong>Total: $ <span id="total">0.00</span></strong>
                </div>

                <button class="btn btn-primary" onclick="guardar()">Guardar Compra</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/default.js"></script>
    <script src="/js/compra.js"></script>
</body>

</html>

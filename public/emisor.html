<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gestor Online - Portafolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestor Online - Portafolio
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 bg-light vh-100">
                <h6 class="mt-3">Menú Principal</h6>
                <ul id="menu" class="nav flex-column mt-3"></ul>
            </div>

            <div class="col-md-10 p-4">
                <h3>Emisores</h3>
                <div class="mb-3 d-flex align-items-center">
                    <button class="btn btn-primary me-2" onclick="nuevoEmisor()">
                        <i class="bi bi-plus"></i> Nuevo
                    </button>

                    <button class="btn btn-warning me-2" onclick="editarEmisor()">
                        <i class="bi bi-pencil"></i> Editar
                    </button>

                    <button class="btn btn-danger me-3" onclick="eliminarEmisor()">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>

                    <div id="toastMensaje" class="toast align-items-center text-bg-warning border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body" id="textoToast">
                                Mensaje
                            </div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
                            </button>
                        </div>
                    </div>
                </div>


                <table class="table table-hover" id="tablaEmisores">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Código</th>
                            <th>Razón Social</th>
                            <th>Nombre</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>


    <!-- MODAL.-->
    <div class="modal fade" id="modalEmisor">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Emisor</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="mensajeErrorModal" class="alert alert-danger d-none" role="alert">Mensajeee</div>
                    <form id="formInstrumento">
                        <div class="mb-3">
                            <label class="form-label">Código</label>
                            <input type="text" class="form-control" id="id_emisor">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Razon Social</label>
                            <input type="text" class="form-control" id="razon_social">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>

                    </form>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="guardarEmisor()">Guardar</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/default.js"></script>
    <script src="/js/emisor.js"></script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gestor Online - Portafolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <img src="img/portafolio-logo.png" class="img-logo-login">
                        <h2 class="mt-3">¡Bienvenido!</h2>
                        <h5>Ingresa tu usuario y contraseña</h5>
                        <!-- error alert -->
                        <div id="mensajeError" class="alert alert-danger mt-3 d-none">
                            Usuario o contraseña incorrectos
                        </div>
                        <div class="mb-3">
                            <input id="usuario" class="form-control" placeholder="Usuario">
                        </div>
                        <div class="mb-3">
                            <input id="clave" type="password" class="form-control" placeholder="Contraseña">
                        </div>
                        <button class="btn btn-custom w-100" onclick="login()">Ingresa aquí</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>

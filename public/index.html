<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow" style="width:350px;">
        <div class="card-body">

            <h4 class="text-center mb-4">Inicar Sesión</h4>

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="usuario" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="clave" class="form-control">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">
                Ingresar
            </button>

            <div id="mensaje" class="text-danger mt-3 text-center"></div>

        </div>
    </div>

</div>

<script src="js/login.js"></script>
</body>
</html>

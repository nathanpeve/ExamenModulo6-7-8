<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consulta Operaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <!-- NAV SUPERIOR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestor Online - Portafolio
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- LAYOUT -->
    <div class="container-fluid">
        <div class="row">

            <!-- MENU LATERAL -->
            <div class="col-md-2 bg-light vh-100">
                <h6 class="mt-3">Menú</h6>
                <ul id="menu" class="nav flex-column mt-3"></ul>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-10 p-4">

                <h3>Consulta de Operaciones</h3>

                <!-- MENSAJE -->
                <div id="alerta" class="alert d-none" role="alert"></div>

                <!-- FILTROS -->
                <div class="row mb-3">
                    <div class="col">
                        <label>Fondo</label>
                        <select id="fondo" class="form-control"></select>
                    </div>

                    <div class="col">
                        <label>Tipo</label>
                        <select id="tipo" class="form-control">
                            <option value="">Todos</option>
                            <option value="C">Compra</option>
                            <option value="V">Venta</option>
                        </select>
                    </div>

                    <div class="col">
                        <label>Desde</label>
                        <input type="date" id="desde" class="form-control">
                    </div>

                    <div class="col">
                        <label>Hasta</label>
                        <input type="date" id="hasta" class="form-control">
                    </div>

                    <div class="col d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="buscar()">
                            <i class="bi bi-search"></i> Busqueda
                        </button>
                    </div>
                </div>

                <!-- TABLA -->
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Fondo</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                            <th>Monto</th>
                            <th>Nemo</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>

            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/default.js"></script>
    <script src="/js/operaciones.js"></script>
</body>

</html>

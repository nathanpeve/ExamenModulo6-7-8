<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cargar Precios de Mercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body>
    <!-- NAV SUPERIOR -->
    <nav class="navbar navbar-dark navbar-portal">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestor Online - Portafolio
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <!-- LAYOUT -->
    <div class="container-fluid">
        <div class="row">

            <!-- MENU LATERAL -->
            <div class="col-md-2 bg-light vh-100">
                <h6 class="mt-3">Menú</h6>
                <ul id="menu" class="nav flex-column mt-3"></ul>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-10 p-4">

                <h3>Cargar Precios de Mercado</h3>



                <div class="mb-3">
                    <label>Seleccione archivo (.txt)</label>
                    <input type="file" id="archivo" class="form-control" accept=".txt">
                </div>

                <button class="btn btn-custom" onclick="subirArchivo()">Subir Archivo</button>

                <!-- Spinner -->
                <div id="loading" class="text-center mt-3" style="display:none;">
                    <div class="spinner-border text-primary"></div>
                    <div>Cargando...</div>
                </div>

                <!-- Resultado -->
                <div id="resultado" class="alert mt-3" style="display:none;"></div>





            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/default.js"></script>
    <script src="/js/precios.js"></script>

</body>

</html>

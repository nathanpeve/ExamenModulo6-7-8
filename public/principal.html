<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Página Principal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Sistema de Cartera Virtual</span>
        <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-5">

    <h3 class="mb-4">Menú Principal</h3>

    <div class="list-group">

        <button class="list-group-item list-group-item-action"
            onclick="ir('compra')">
            Ingresar Compra
        </button>

        <button class="list-group-item list-group-item-action"
            onclick="ir('venta')">
            Ingresar Venta
        </button>

        <button class="list-group-item list-group-item-action"
            onclick="ir('precios')">
            Ingresar Precios de Mercado
        </button>

        <button class="list-group-item list-group-item-action"
            onclick="ir('valorizar')">
            Valorizar Cartera
        </button>

        <button class="list-group-item list-group-item-action"
            onclick="ir('consulta')">
            Consulta de Cartera
        </button>

    </div>

</div>

<script src="js/principal.js"></script>
</body>
</html>
